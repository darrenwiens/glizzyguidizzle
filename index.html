<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlizzyGuidizzle — Canadian Tire Locations</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/map.css">
  <link rel="stylesheet" href="/styles/inspection.css">
  <link rel="stylesheet" href="/styles/animations.css">
  <link rel="stylesheet" href="/styles/responsive.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app__header header" role="banner">
      <div class="header__logo">
        <span class="header__logo-icon">🌭</span>
        <span class="header__logo-text">GlizzyGuidizzle</span>
      </div>

      <div class="header__search">
        <span class="header__search-icon">🔍</span>
        <input
          type="search"
          class="header__search-input"
          id="search-input"
          placeholder="Search locations…"
          aria-label="Search locations by name or address"
        >
      </div>

      <div class="header__stats">
        <div class="header__progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Inspection progress">
          <div class="header__progress-found" id="progress-found" style="width: 0"></div>
          <div class="header__progress-not-found" id="progress-not-found" style="width: 0"></div>
        </div>
        <span class="header__stats-text" id="stats-text">0 / 0</span>
      </div>

      <button class="btn btn--ghost btn--icon" id="help-btn" aria-label="Show help" title="Keyboard shortcuts (?)">?</button>
    </header>

    <!-- Main Body -->
    <main class="app__body">

      <!-- Map View -->
      <section class="map-view" id="map-view">
        <div class="map-view__map">
          <div id="map-container" role="region" aria-label="Map of Canadian Tire Locations"></div>

          <!-- Loading overlay -->
          <div class="loading-overlay" id="loading-overlay">
            <div class="loading-spinner"></div>
          </div>

          <!-- Error banner -->
          <div class="error-banner is-hidden" id="error-banner" role="alert">
            <span id="error-message">Failed to load locations.</span>
            <button class="btn btn--sm error-banner__retry" id="retry-btn">Retry</button>
          </div>
        </div>

        <aside class="map-view__sidebar" id="sidebar">
          <div class="sidebar__header">
            <div class="sidebar__filters" role="group" aria-label="Filter by status">
              <button class="btn btn--sm is-active" data-filter="all">All</button>
              <button class="btn btn--sm" data-filter="unvisited">Unvisited</button>
              <button class="btn btn--sm" data-filter="stand-found">Stand Found</button>
              <button class="btn btn--sm" data-filter="no-stand">No Stand</button>
              <button class="btn btn--sm" data-filter="no-cantire">No CT</button>
              <button class="btn btn--sm" data-filter="insufficient-view">Insuf. View</button>
            </div>
          </div>
          <div class="sidebar__list" id="location-list" role="list" aria-label="Location list">
            <div class="sidebar__empty">Loading locations…</div>
          </div>
          <div class="legend">
            <span class="legend__item"><span class="legend__dot legend__dot--unvisited"></span> Unvisited</span>
            <span class="legend__item"><span class="legend__dot legend__dot--stand-found"></span> Stand Found</span>
            <span class="legend__item"><span class="legend__dot legend__dot--no-stand"></span> No Stand</span>
            <span class="legend__item"><span class="legend__dot legend__dot--no-cantire"></span> No CT</span>
            <span class="legend__item"><span class="legend__dot legend__dot--insufficient-view"></span> Insuf. View</span>
          </div>
        </aside>
      </section>

      <!-- Inspection View (hidden by default) -->
      <section class="inspection-view is-hidden" id="inspection-view" aria-label="Location inspection">
        <div class="inspection-view__header">
          <button class="btn btn--ghost" id="back-btn" aria-label="Back to map">← Back</button>
          <div class="inspection-view__info">
            <span class="inspection-view__title" id="inspect-title"></span>
            <span id="inspect-address"></span>
          </div>
          <button class="btn btn--sm" id="skip-btn" aria-label="Skip to next unvisited location">Skip →</button>
        </div>

        <div class="inspection-view__streetview" role="region" aria-label="Street View panorama" id="streetview-wrapper">
          <div id="streetview-container"></div>
          <canvas class="annotation-canvas" id="annotation-canvas" role="img" aria-label="Annotation overlay"></canvas>

          <!-- Street View unavailable fallback -->
          <div class="streetview-fallback is-hidden" id="streetview-fallback">
            <span class="streetview-fallback__icon">📷</span>
            <p>Street View is not available at this location.</p>
          </div>
        </div>

        <div class="inspection-view__toolbar" role="toolbar" aria-label="Inspection tools">
          <div role="group" aria-label="Hotdog stand status">
            <button class="btn btn--sm" data-status="stand-found" style="--_c: var(--color-found)">✓ Stand Found</button>
            <button class="btn btn--sm" data-status="no-stand" style="--_c: var(--color-not-found)">✕ No Stand</button>
            <button class="btn btn--sm" data-status="no-cantire" style="--_c: var(--color-warning)">⊘ No Canadian Tire</button>
            <button class="btn btn--sm" data-status="insufficient-view" style="--_c: var(--color-insufficient)">? Insufficient View</button>
          </div>

          <div class="toolbar__divider"></div>

          <div class="annotation-toolbar">
            <button class="btn btn--sm" id="draw-btn" aria-label="Draw bounding box">📦 Draw Box</button>
            <button class="btn btn--sm" id="clear-bbox-btn" aria-label="Clear bounding box">Clear</button>
          </div>

          <div class="toolbar__spacer"></div>

          <button class="btn btn--sm" id="save-btn">Save</button>
          <button class="btn btn--primary btn--sm" id="save-next-btn">Save & Next →</button>
        </div>
      </section>

    </main>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Screen reader announcements -->
    <div id="sr-announcements" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
  </div>

  <!-- MarkerClusterer -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer@2.5.3/dist/index.min.js"
          async defer></script>

  <!-- App (loads Google Maps API dynamically with env key) -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
